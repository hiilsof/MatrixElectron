function buildSysinfoPanel(body, reg){
  const wrap=document.createElement('div');
  wrap.style.cssText='display:flex;flex-direction:column;height:100%;overflow-y:auto;padding:12px 16px;gap:12px;font:12px/1.6 "Courier New",monospace;color:var(--col);';
  wrap.innerHTML='<div style="opacity:.4">Loading system information...</div>';
  body.appendChild(wrap);
  if(!window.electronAPI){ wrap.innerHTML='<div style="opacity:.4">Run inside Electron to see system info.</div>'; return; }
  function section(title,rows){
    const sec=document.createElement('div');
    sec.style.cssText='border:1px solid rgba(0,255,65,.15);padding:8px 12px;border-radius:2px;';
    const t=document.createElement('div');
    t.style.cssText='color:#00ccff;font-size:10px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;border-bottom:1px solid rgba(0,255,65,.1);padding-bottom:3px;';
    t.textContent=title; sec.appendChild(t);
    rows.forEach(([k,v,col])=>{
      const row=document.createElement('div'); row.style.cssText='display:flex;justify-content:space-between;padding:1px 0;';
      const key=document.createElement('span'); key.style.cssText='opacity:.5;font-size:11px;'; key.textContent=k;
      const val=document.createElement('span'); val.style.cssText='font-weight:bold;color:'+(col||'var(--col)')+';text-align:right;'; val.textContent=v;
      row.appendChild(key); row.appendChild(val); sec.appendChild(row);
    });
    return sec;
  }
  window.electronAPI.getSysinfo().then(d=>{
    wrap.innerHTML='';
    if(!d.ok){ wrap.innerHTML='<div style="color:#ff4444">Error: '+d.error+'<br><br>Run: npm install systeminformation --save</div>'; return; }
    wrap.appendChild(section('OPERATING SYSTEM',[
      ['OS', d.os.distro+' '+d.os.release],['Arch',d.os.arch],
      ['Host',d.os.hostname],['User',d.os.username],['Uptime',fmtUptime(d.os.uptime)],
    ]));
    wrap.appendChild(section('CPU',[
      ['Model',d.cpu.brand],['Vendor',d.cpu.manufacturer],
      ['Speed',d.cpu.speed+' GHz'],['Cores',d.cpu.physicalCores+' physical / '+d.cpu.cores+' logical'],
    ]));
    wrap.appendChild(section('MEMORY',[
      ['Total',fmtBytes(d.mem.total)],['Used',fmtBytes(d.mem.used)],['Free',fmtBytes(d.mem.free)],
      ['Usage',Math.round(d.mem.used/d.mem.total*100)+'%'],
    ]));
    if(d.gpu&&d.gpu.length) d.gpu.forEach((g,i)=>{
      wrap.appendChild(section('GPU'+(d.gpu.length>1?' '+(i+1):''),[
        ['Model',g.model],['Vendor',g.vendor],['VRAM',g.vram?g.vram+' MB':'N/A'],
      ]));
    });
    if(d.displays&&d.displays.length) wrap.appendChild(section('DISPLAY',
      d.displays.map((d2,i)=>['Screen '+(d.displays.length>1?i+1:''),d2.resolutionX+'x'+d2.resolutionY+(d2.currentRefreshRate?' @ '+d2.currentRefreshRate+'Hz':'')])
    ));
    if(d.disks&&d.disks.length) wrap.appendChild(section('STORAGE',
      d.disks.map(dk=>['Disk',dk.name+' ('+dk.type+') '+fmtBytes(dk.size)])
    ));
    if(d.battery&&d.battery.hasBattery) wrap.appendChild(section('BATTERY',[
      ['Level',d.battery.percent+'%'],['Charging',d.battery.isCharging?'Yes':'No'],
    ]));
  }).catch(e=>{ wrap.innerHTML='<div style="color:#ff4444">Error: '+e.message+'<br>Run: npm install systeminformation --save</div>'; });
}

  body.appendChild(wrap);
  if(!window.electronAPI){ wrap.innerHTML='<div style="opacity:.4">Run inside Electron for live performance data.</div>'; return; }

  function block(title){ const d=document.createElement('div'); d.style.cssText='border:1px solid rgba(0,255,65,.15);padding:8px 12px;border-radius:2px;'; d.innerHTML='<div style="color:#00ccff;font-size:10px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;">'+title+'</div>'; wrap.appendChild(d); return d; }
  function barRow(parent,label,pct,sub){ const c=pct>85?'#ff4444':pct>60?'#ffcc00':'var(--col)'; const row=document.createElement('div'); row.style.cssText='display:flex;align-items:center;gap:8px;margin:3px 0;'; row.innerHTML='<div style="width:90px;flex-shrink:0;opacity:.55;font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="'+label+'">'+label+'</div><div style="flex:1;height:10px;background:rgba(0,255,65,.08);border:1px solid rgba(0,255,65,.15);border-radius:1px;overflow:hidden;"><div style="height:100%;width:'+pct+'%;background:'+c+';transition:width .4s;"></div></div><div style="width:38px;text-align:right;color:'+c+';">'+pct+'%</div>'; parent.appendChild(row); if(sub){ const s=document.createElement('div'); s.style.cssText='opacity:.4;font-size:10px;margin-bottom:4px;'; s.textContent=sub; parent.appendChild(s); } }
  function fmtSpeed(b){ if(!b||b<=0)return'0 B/s'; const u=['B/s','KB/s','MB/s']; let i=0,n=b; while(n>=1024&&i<2){n/=1024;i++;} return n.toFixed(1)+' '+u[i]; }

  const cpuBlock=block('CPU');
  const cpuBarWrap=document.createElement('div'); cpuBlock.appendChild(cpuBarWrap);
  const cpuCanvas=document.createElement('canvas'); cpuCanvas.style.cssText='width:100%;height:55px;display:block;margin-top:6px;'; cpuBlock.appendChild(cpuCanvas);
  const cpuCores=document.createElement('div'); cpuCores.style.cssText='opacity:.4;font-size:10px;margin-top:4px;'; cpuBlock.appendChild(cpuCores);

  const memBlock=block('MEMORY'); const memBarWrap=document.createElement('div'); memBlock.appendChild(memBarWrap);
  const memSub=document.createElement('div'); memSub.style.cssText='opacity:.4;font-size:10px;margin-top:2px;'; memBlock.appendChild(memSub);

  const fsBlock=block('STORAGE'); const fsRows=document.createElement('div'); fsBlock.appendChild(fsRows);
  const netBlock=block('NETWORK'); const netRows=document.createElement('div'); netBlock.appendChild(netRows);
  const gpuBlock=block('GPU'); const gpuRows=document.createElement('div'); gpuBlock.appendChild(gpuRows);

  function drawGraph(canvas,hist){
    const dpr=window.devicePixelRatio||1, W=canvas.clientWidth, H=55;
    canvas.width=W*dpr; canvas.height=H*dpr;
    const ctx=canvas.getContext('2d'); ctx.scale(dpr,dpr);
    ctx.clearRect(0,0,W,H);
    ctx.strokeStyle='rgba(0,255,65,0.08)'; ctx.lineWidth=1;
    [25,50,75].forEach(y=>{ const py=H-(y/100)*H; ctx.beginPath(); ctx.moveTo(0,py); ctx.lineTo(W,py); ctx.stroke(); });
    ctx.beginPath(); hist.forEach((v,i)=>{ const x=(i/59)*W,y=H-(v/100)*H; i===0?ctx.moveTo(x,y):ctx.lineTo(x,y); });
    ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath();
    ctx.fillStyle='rgba(0,255,65,0.1)'; ctx.fill();
    ctx.beginPath(); hist.forEach((v,i)=>{ const x=(i/59)*W,y=H-(v/100)*H; i===0?ctx.moveTo(x,y):ctx.lineTo(x,y); });
    ctx.strokeStyle='rgba(0,255,65,0.8)'; ctx.lineWidth=1.5; ctx.stroke();
  }

  window.electronAPI.onPerfData(d=>{
    CPU_HIST.push(d.cpu.load); CPU_HIST.shift();
    cpuBarWrap.innerHTML=''; barRow(cpuBarWrap,'Total',d.cpu.load,'');
    drawGraph(cpuCanvas,CPU_HIST);
    if(d.cpu.cores&&d.cpu.cores.length) cpuCores.textContent='Cores: '+d.cpu.cores.map(c=>c+'%').join('  ');
    const mp=Math.round(d.mem.used/d.mem.total*100);
    memBarWrap.innerHTML=''; barRow(memBarWrap,'RAM',mp,'');
    memSub.textContent=fmtBytes(d.mem.used)+' used of '+fmtBytes(d.mem.total);
    fsRows.innerHTML=''; (d.fs||[]).forEach(f=>{ const p=Math.round(f.use)||0; barRow(fsRows,f.mount,p,fmtBytes(f.used)+' / '+fmtBytes(f.size)); });
    netRows.innerHTML=''; (d.net||[]).forEach(n=>{ if(!n.iface)return; const r=document.createElement('div'); r.style.cssText='display:flex;gap:12px;margin:2px 0;'; r.innerHTML='<span style="opacity:.5;width:90px;overflow:hidden;text-overflow:ellipsis;">'+n.iface+'</span><span style="color:var(--col)">↓ '+fmtSpeed(n.rx)+'</span><span style="color:#00ccff">↑ '+fmtSpeed(n.tx)+'</span>'; netRows.appendChild(r); });
    gpuRows.innerHTML='';
    if(!d.gpu||!d.gpu.length){ gpuRows.innerHTML='<div style="opacity:.35">GPU data unavailable</div>'; }
    else{ d.gpu.forEach(g=>{ const gu=g.utilizationGpu||0; const sub=g.memoryTotal?g.memoryUsed+'/'+g.memoryTotal+'MB'+(g.temperatureGpu?' · '+g.temperatureGpu+'°C':''):''; barRow(gpuRows,g.model.split(' ').slice(-2).join(' '),gu,sub); }); }
  });

  window.electronAPI.onPerfError(msg=>{ wrap.innerHTML='<div style="color:#ff4444">Error: '+msg+'</div>'; });
  window.electronAPI.startPerf();
}

function buildDictPanel(body, reg){
  const wrap=document.createElement('div'); wrap.className='dict-wrap';
  const bar=document.createElement('div'); bar.className='dict-search-bar';
  const inp=document.createElement('input'); inp.type='text'; inp.placeholder='Search word...'; inp.spellcheck=false;
  const btn=document.createElement('button'); btn.className='dict-search-btn'; btn.textContent='Search';
  bar.appendChild(inp); bar.appendChild(btn); wrap.appendChild(bar);
  const res=document.createElement('div'); res.className='dict-results';
  res.innerHTML='<div class="dict-empty">Type a word and press Enter or Search</div>';
  wrap.appendChild(res); body.appendChild(wrap);
  async function search(){
    const q=inp.value.trim(); if(!q)return;
    res.innerHTML='<div class="dict-loading">Looking up "'+q+'"...</div>';
    try{
      const data=await(await fetch('https://api.dictionaryapi.dev/api/v2/entries/en/'+encodeURIComponent(q))).json();
      if(!Array.isArray(data)||!data.length){res.innerHTML='<div class="dict-empty">No results for "'+q+'"</div>';return;}
      res.innerHTML='';
      data.forEach((entry,ei)=>{
        if(ei>0){const sep=document.createElement('hr');sep.className='dict-separator';res.appendChild(sep);}
        const word=document.createElement('div');word.className='dict-word';word.textContent=entry.word;res.appendChild(word);
        const ph=entry.phonetics?.find(p=>p.text)?.text||'';
        if(ph){const phEl=document.createElement('div');phEl.className='dict-phonetic';phEl.textContent=ph;res.appendChild(phEl);}
        (entry.meanings||[]).forEach(m=>{
          const pos=document.createElement('div');pos.className='dict-pos';pos.textContent=m.partOfSpeech;res.appendChild(pos);
          (m.definitions||[]).slice(0,4).forEach((d,di)=>{
            const def=document.createElement('div');def.className='dict-def';def.textContent=(di+1)+'. '+d.definition;res.appendChild(def);
            if(d.example){const ex=document.createElement('div');ex.className='dict-example';ex.textContent='"'+d.example+'"';res.appendChild(ex);}
          });
          if(m.synonyms?.length){const sy=document.createElement('div');sy.className='dict-synonyms';sy.textContent='Synonyms: '+m.synonyms.slice(0,6).join(', ');res.appendChild(sy);}
        });
      });
    }catch(e){res.innerHTML='<div class="dict-empty">Error: '+e.message+'</div>';}
  }
  btn.onclick=search;
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')search();});
  setTimeout(()=>inp.focus(),100);
}

function buildJishoPanel(body, reg){
  const wrap=document.createElement('div'); wrap.className='dict-wrap';
  const bar=document.createElement('div'); bar.className='dict-search-bar';
  const inp=document.createElement('input'); inp.type='text'; inp.placeholder='English, Japanese, or romaji...'; inp.spellcheck=false;
  const btn=document.createElement('button'); btn.className='dict-search-btn'; btn.textContent='Search';
  bar.appendChild(inp); bar.appendChild(btn); wrap.appendChild(bar);
  const res=document.createElement('div'); res.className='dict-results';
  res.innerHTML='<div class="dict-empty">Search in English, Japanese, or romaji</div>';
  wrap.appendChild(res); body.appendChild(wrap);
  async function search(){
    const q=inp.value.trim(); if(!q)return;
    res.innerHTML='<div class="dict-loading">Searching Jisho for "'+q+'"...</div>';
    try{
      const data=await(await fetch('https://jisho.org/api/v1/search/words?keyword='+encodeURIComponent(q))).json();
      const words=data?.data||[];
      if(!words.length){res.innerHTML='<div class="dict-empty">No results for "'+q+'"</div>';return;}
      res.innerHTML='';
      words.slice(0,8).forEach((entry,ei)=>{
        if(ei>0){const sep=document.createElement('hr');sep.className='dict-separator';res.appendChild(sep);}
        const jp=entry.japanese?.[0];
        const wordEl=document.createElement('div');wordEl.className='jp-word';wordEl.textContent=jp?.word||jp?.reading||'?';res.appendChild(wordEl);
        if(jp?.reading&&jp?.word){const rdEl=document.createElement('div');rdEl.className='jp-reading';rdEl.textContent=jp.reading;res.appendChild(rdEl);}
        const tags=[...(entry.jlpt||[]),...(entry.tags||[])];
        if(entry.is_common)tags.unshift('common');
        if(tags.length){const tEl=document.createElement('div');tEl.className='jp-tags';tags.forEach(tag=>{const t=document.createElement('span');t.className='jp-tag'+(tag.startsWith('jlpt')||tag==='common'?' jlpt':'');t.textContent=tag.replace('jlpt-','JLPT ').toUpperCase();tEl.appendChild(t);});res.appendChild(tEl);}
        (entry.senses||[]).slice(0,4).forEach((sense,si)=>{
          const posEl=document.createElement('div');posEl.className='jp-sense-pos';posEl.textContent=(sense.parts_of_speech||[]).join(', ');res.appendChild(posEl);
          const sEl=document.createElement('div');sEl.className='jp-sense';sEl.textContent=(si+1)+'. '+(sense.english_definitions||[]).join(', ');res.appendChild(sEl);
        });
        if(entry.japanese?.length>1){const alt=document.createElement('div');alt.className='dict-synonyms';alt.textContent='Also: '+entry.japanese.slice(1,4).map(j=>j.word||j.reading).join('、');res.appendChild(alt);}
      });
    }catch(e){res.innerHTML='<div class="dict-empty">Error - Jisho may be unreachable: '+e.message+'</div>';}
  }
  btn.onclick=search;
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')search();});
  setTimeout(()=>inp.focus(),100);
}
